default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password:
  host: localhost

development:
  <<: *default
  database: ruby_assignment_development

test:
  <<: *default
  database: ruby_assignment_test

production:
  <<: *default
  database: ruby_assignment_production